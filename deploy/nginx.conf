# Nginx Virtual Host for SmartTextToSpeech
# Place this file at: /etc/nginx/sites-available/smarttexttospeech
# Then: sudo ln -s /etc/nginx/sites-available/smarttexttospeech /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;       # <-- Change to your domain or IP

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;

    # Limit upload size (text input max 5,000 chars ≈ 10 KB; add headroom)
    client_max_body_size 64k;

    # Proxy all requests to Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;   # TTS generation timeout
        proxy_read_timeout    120s;
    }

    # Serve audio files — disable buffering for smooth streaming
    location /api/audio/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_buffering    off;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header         Cache-Control   "no-store, no-cache";
    }

    # Serve static files directly via Nginx (faster than Flask)
    location /static/ {
        alias      /var/www/smarttexttospeech/static/;
        expires    7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    error_log  /var/log/nginx/smarttexttospeech-error.log;
    access_log /var/log/nginx/smarttexttospeech-access.log;
}

